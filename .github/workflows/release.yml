name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: dejadupe-linux-x86_64.tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: dejadupe-windows-x86_64.zip
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive: dejadupe-macos-x86_64.tar.gz
          - runner: macos-15
            target: aarch64-apple-darwin
            archive: dejadupe-macos-aarch64.tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/package
          cp target/${{ matrix.target }}/release/dejadupe dist/package/
          tar -C dist/package -czf dist/${{ matrix.archive }} dejadupe

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/package | Out-Null
          Copy-Item target/${{ matrix.target }}/release/dejadupe.exe dist/package/
          Compress-Archive -Path dist/package/dejadupe.exe -DestinationPath dist/${{ matrix.archive }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: cd dist && sha256sum * > SHA256SUMS
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          gh release upload "$GITHUB_REF_NAME" dist/* --clobber
